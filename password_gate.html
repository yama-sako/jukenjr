<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>冒険への入り口</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&family=DotGothic16&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#0a1020;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:16px;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;}to{opacity:.9;}}
.scene-wrap{position:fixed;inset:0;z-index:1;
  display:flex;align-items:flex-end;justify-content:center;pointer-events:none;}
.gate{
  position:relative;z-index:10;width:min(400px,100%);
  background:rgba(8,14,32,.95);border:2px solid #2a4a80;border-radius:20px;
  padding:clamp(18px,4vw,30px) clamp(14px,4vw,26px);text-align:center;
  box-shadow:0 0 60px rgba(59,130,246,.15),0 0 120px rgba(0,0,0,.6);
}
.gate-logo{font-size:clamp(34px,8vw,50px);display:block;margin-bottom:4px;
  animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.gate-title{font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:clamp(16px,4.5vw,24px);font-weight:900;color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.4);margin-bottom:4px;line-height:1.3;}
.gate-sub{font-size:11px;color:#6080b0;margin-bottom:clamp(12px,3vw,22px);letter-spacing:1px;}
.char-row{display:flex;gap:14px;justify-content:center;margin-bottom:clamp(12px,3vw,22px);}
.char-bubble{display:flex;flex-direction:column;align-items:center;gap:5px;}
.char-av{width:50px;height:50px;border-radius:50%;overflow:hidden;
  border:2px solid #2a4a80;background:rgba(30,58,120,.3);}
.char-av svg{width:50px;height:50px;}
.char-label{font-size:10px;color:#5080b0;font-family:'DotGothic16',sans-serif;}
.pw-label{font-size:12px;color:#8090b0;margin-bottom:8px;letter-spacing:1px;}
.pw-wrap{display:flex;gap:8px;margin-bottom:10px;}
.pw-input{
  flex:1;background:rgba(20,35,70,.9);border:1.5px solid #2a4a80;border-radius:12px;
  color:#e0ecff;font-size:18px;font-family:'DotGothic16',sans-serif;
  padding:12px 12px;outline:none;letter-spacing:4px;text-align:center;
  transition:border-color .2s;-webkit-appearance:none;
}
.pw-input::placeholder{letter-spacing:1px;font-size:12px;color:#2a4060;}
.pw-input:focus{border-color:#5bc8f5;}
.btn-enter{
  background:linear-gradient(135deg,#1a5aaa,#2a7ae0);color:#fff;border:none;
  border-radius:12px;font-family:'DotGothic16',sans-serif;font-size:15px;
  padding:12px 16px;cursor:pointer;white-space:nowrap;
  box-shadow:0 4px 0 #0e3880;transition:all .15s;flex-shrink:0;
  -webkit-appearance:none;
}
.btn-enter:active{transform:translateY(2px);box-shadow:0 2px 0 #0e3880;}
.err-msg{font-size:12px;color:#ef4444;margin-bottom:8px;min-height:16px;
  font-family:'DotGothic16',sans-serif;opacity:0;transition:opacity .3s;}
.err-msg.show{opacity:1;}
.portal-area{display:none;}
.portal-area.open{display:block;}
.divider{border:none;border-top:1px solid #1a2840;margin:16px 0 14px;}
.unlock-msg{font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:900;
  color:#ffd700;margin-bottom:16px;animation:glow-t 1.5s ease-in-out infinite alternate;}
@keyframes glow-t{from{text-shadow:0 0 8px rgba(255,215,0,.3);}
  to{text-shadow:0 0 20px rgba(255,215,0,.8);}}
.portal-btn-main{
  display:block;width:100%;
  background:linear-gradient(135deg,#1a3a8a,#2a5acd);
  border:2px solid #5bc8f5;border-radius:16px;
  padding:18px 14px;cursor:pointer;text-align:center;
  text-decoration:none;transition:all .2s;
}
.portal-btn-main:active{transform:scale(.97);}
.pb-icon{font-size:34px;display:block;margin-bottom:8px;}
.pb-label{font-family:'M PLUS Rounded 1c',sans-serif;font-size:16px;font-weight:900;
  color:#e0f4ff;display:block;margin-bottom:4px;}
.pb-sub{font-size:11px;color:#5bc8f5;}
.footer-note{font-size:10px;color:#2a3850;margin-top:14px;letter-spacing:1px;}
@keyframes shake{
  0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}
}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="scene-wrap">
<svg viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg"
     style="width:100%;position:absolute;bottom:0;">
  <polygon points="0,240 120,55 240,150 360,18 480,132 600,38 720,115 800,55 800,240"
           fill="#0c1828" opacity=".9"/>
  <polygon points="0,240 80,125 200,192 320,65 440,172 560,85 680,152 800,105 800,240"
           fill="#0f2040" opacity=".95"/>
  <polygon points="320,65 340,95 358,82 376,98 396,65 358,48" fill="#e8f0ff" opacity=".5"/>
  <polygon points="560,85 576,108 590,97 604,110 620,85 590,70" fill="#e8f0ff" opacity=".4"/>
  <path d="M0,240 Q200,170 400,198 Q600,225 800,178 L800,240Z" fill="#060e1c"/>
  <circle cx="680" cy="42" r="20" fill="#fffde0" opacity=".8"/>
  <circle cx="691" cy="36" r="16" fill="#0c1828" opacity=".9"/>
  <rect x="374" y="152" width="52" height="5" rx="2" fill="#c03020" opacity=".6"/>
  <rect x="378" y="138" width="44" height="4" rx="2" fill="#c03020" opacity=".6"/>
  <rect x="382" y="142" width="5"  height="65" rx="2" fill="#a02010" opacity=".6"/>
  <rect x="413" y="142" width="5"  height="65" rx="2" fill="#a02010" opacity=".6"/>
  <circle cx="100" cy="28" r="1.5" fill="#fff" opacity=".7"/>
  <circle cx="450" cy="10" r="2"   fill="#fff" opacity=".8"/>
  <circle cx="550" cy="30" r="1.5" fill="#fff" opacity=".6"/>
</svg>
</div>

<div class="gate" id="gate">
  <span class="gate-logo">🏔️</span>
  <div class="gate-title">中学受験への道</div>
  <div class="gate-sub">SOCIAL &amp; SCIENCE ADVENTURE</div>

  <div class="char-row">
    <div class="char-bubble">
      <div class="char-av">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="42" width="40" height="18" rx="8" fill="#1a6bbf"/>
          <rect x="24" y="36" width="12" height="10" rx="4" fill="#f0c898"/>
          <ellipse cx="30" cy="25" rx="17" ry="18" fill="#f0c898"/>
          <ellipse cx="30" cy="13" rx="17" ry="9" fill="#1a1008"/>
          <ellipse cx="13" cy="20" rx="5" ry="8" fill="#1a1008"/>
          <ellipse cx="47" cy="20" rx="5" ry="8" fill="#1a1008"/>
          <path d="M14,18 Q20,10 30,10 Q40,10 46,18 Q40,14 30,15 Q20,14 14,18Z" fill="#1a1008"/>
          <ellipse cx="23" cy="26" rx="3" ry="3.2" fill="#1a1008"/>
          <ellipse cx="37" cy="26" rx="3" ry="3.2" fill="#1a1008"/>
          <circle cx="24" cy="25" r=".9" fill="#fff" opacity=".8"/>
          <circle cx="38" cy="25" r=".9" fill="#fff" opacity=".8"/>
          <path d="M19,22 Q23,20 27,22" fill="none" stroke="#1a1008" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M33,22 Q37,20 41,22" fill="none" stroke="#1a1008" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="30" cy="30" rx="2" ry="1.5" fill="#d4a070" opacity=".6"/>
          <path d="M24,34 Q30,39 36,34" fill="none" stroke="#c07040" stroke-width="1.8" stroke-linecap="round"/>
          <ellipse cx="19" cy="32" rx="4" ry="2.5" fill="#ffaaaa" opacity=".4"/>
          <ellipse cx="41" cy="32" rx="4" ry="2.5" fill="#ffaaaa" opacity=".4"/>
          <ellipse cx="12" cy="26" rx="4" ry="5" fill="#f0c898"/>
          <ellipse cx="48" cy="26" rx="4" ry="5" fill="#f0c898"/>
        </svg>
      </div>
      <div class="char-label">オウスケ</div>
    </div>
    <div style="font-size:22px;align-self:center;color:#2a4a80;">✦</div>
    <div class="char-bubble">
      <div class="char-av">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="42" width="40" height="18" rx="8" fill="#1a5a9f"/>
          <rect x="24" y="36" width="12" height="10" rx="4" fill="#f0c898"/>
          <ellipse cx="30" cy="25" rx="17" ry="18" fill="#f0c898"/>
          <ellipse cx="30" cy="13" rx="17" ry="9" fill="#1a1008"/>
          <ellipse cx="13" cy="20" rx="5" ry="8" fill="#1a1008"/>
          <ellipse cx="47" cy="20" rx="5" ry="8" fill="#1a1008"/>
          <path d="M15,17 L18,10 L22,16 L26,8 L30,14 L34,8 L38,16 L42,10 L45,17 Q40,13 30,14 Q20,13 15,17Z" fill="#1a1008"/>
          <ellipse cx="23" cy="26" rx="3" ry="3.2" fill="#1a1008"/>
          <ellipse cx="37" cy="26" rx="3" ry="3.2" fill="#1a1008"/>
          <circle cx="24" cy="25" r=".9" fill="#fff" opacity=".8"/>
          <circle cx="38" cy="25" r=".9" fill="#fff" opacity=".8"/>
          <path d="M19,21 Q23,18 27,21" fill="none" stroke="#1a1008" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M33,21 Q37,18 41,21" fill="none" stroke="#1a1008" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="30" cy="30" rx="2" ry="1.5" fill="#d4a070" opacity=".6"/>
          <path d="M23,34 Q30,40 37,34" fill="none" stroke="#c07040" stroke-width="1.8" stroke-linecap="round"/>
          <ellipse cx="19" cy="32" rx="4" ry="2.5" fill="#ffaaaa" opacity=".4"/>
          <ellipse cx="41" cy="32" rx="4" ry="2.5" fill="#ffaaaa" opacity=".4"/>
          <ellipse cx="12" cy="26" rx="4" ry="5" fill="#f0c898"/>
          <ellipse cx="48" cy="26" rx="4" ry="5" fill="#f0c898"/>
        </svg>
      </div>
      <div class="char-label">サクト</div>
    </div>
  </div>

  <div class="pw-label">🔑 パスワードを入力してね</div>
  <div class="pw-wrap" id="pw-wrap">
    <input type="password" class="pw-input" id="pw"
           placeholder="パスワード" maxlength="20" autocomplete="off"/>
    <button class="btn-enter" onclick="tryEnter()">▶ 入る</button>
  </div>
  <div class="err-msg" id="err">パスワードがちがうよ！もう一度！</div>

  <div class="portal-area" id="portal">
    <hr class="divider"/>
    <div class="unlock-msg" id="unlock-msg">冒険の扉が開いた！</div>
    <a class="portal-btn-main"
       href="https://yama-sako.github.io/jukenjr/stamp_sheet.html"
       target="_blank">
      <span class="pb-icon">🗺️</span>
      <span class="pb-label">冒険の記録へ進む</span>
      <span class="pb-sub">スタンプシート＆ポータル</span>
    </a>
  </div>

  <div class="footer-note">✦ JUKENJR ADVENTURE ✦</div>
</div>

<script>
/* starfield */
const sf=document.getElementById('stars');
for(let i=0;i<65;i++){
  const s=document.createElement('div');s.className='star';
  const z=Math.random()*2.5+.5;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
    width:${z}px;height:${z}px;--d:${(Math.random()*4+2).toFixed(1)}s;
    animation-delay:${(Math.random()*4).toFixed(1)}s;opacity:${(Math.random()*.5+.1).toFixed(2)};`;
  sf.appendChild(s);
}

const H='a8e637868c5bf190f57db6db972b8fb90ea03454f7db777c0f807db6d20679a5';
const SK='jukenjr_v3';
function hex(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function tryEnter(){
  const v=document.getElementById('pw').value.trim().toLowerCase();
  if(!v)return;
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)).then(buf=>{
    if(hex(buf)===H){unlock();}
    else{
      document.getElementById('err').classList.add('show');
      document.getElementById('gate').classList.add('shake');
      setTimeout(()=>document.getElementById('gate').classList.remove('shake'),400);
      setTimeout(()=>document.getElementById('err').classList.remove('show'),2500);
      document.getElementById('pw').value='';
    }
  });
}
function unlock(){
  sessionStorage.setItem(SK,'1');
  document.getElementById('pw-wrap').style.display='none';
  document.querySelector('.pw-label').style.display='none';
  document.getElementById('err').style.display='none';
  document.getElementById('portal').classList.add('open');
  const h=new Date().getHours();
  document.getElementById('unlock-msg').textContent=
    (h<12?'おはよう！':'こんにちは！')+'冒険の扉が開いた！';
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});
if(sessionStorage.getItem(SK)==='1')unlock();
</script>
</body>
</html>
