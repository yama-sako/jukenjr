<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理クエスト｜日本のすがた RPGクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --panel: #111827;
    --border: #1f3050;
    --gold: #ffd700;
    --blue: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --purple: #8b5cf6;
    --text: #e2e8f0;
    --muted: #6b8aaa;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* PIXEL STARS */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: 
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.2), transparent),
      radial-gradient(2px 2px at 10% 60%, rgba(255,215,0,0.2), transparent),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.25), transparent);
    pointer-events:none;
    z-index:0;
  }

  #app {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index:1;
  }

  /* TITLE SCREEN */
  #title-screen {
    text-align: center;
    padding: 40px 20px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(59,130,246,0.2);
  }

  .pixel-title {
    font-family: 'DotGothic16', sans-serif;
    font-size: clamp(20px, 5vw, 32px);
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5), 2px 2px 0 rgba(0,0,0,0.8);
    line-height: 1.4;
    margin-bottom: 10px;
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,215,0,0.3); }
    to { text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.3); }
  }

  .title-sub { font-size: 13px; color: var(--muted); margin-bottom: 30px; letter-spacing: 1px; }

  .hero-sprite {
    font-size: 80px;
    margin: 20px 0;
    animation: float 3s ease-in-out infinite;
    display: block;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .title-info {
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 12px;
    padding: 14px;
    margin: 20px 0;
    font-size: 13px;
    line-height: 1.8;
    color: #a0c4e8;
  }

  /* BUTTONS */
  .btn {
    display: inline-block;
    padding: 14px 40px;
    border: none;
    border-radius: 10px;
    font-family: 'DotGothic16', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    letter-spacing: 1px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    box-shadow: 0 4px 0 #1e3a8a, 0 8px 20px rgba(37,99,235,0.3);
  }
  .btn-primary:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); transform: translateY(-2px); box-shadow: 0 6px 0 #1e3a8a, 0 12px 25px rgba(37,99,235,0.4); }
  .btn-answer {
    display: block;
    width: 100%;
    padding: 16px 20px;
    margin-bottom: 10px;
    background: #1a2848;
    border: 2px solid #2a4070;
    border-radius: 12px;
    color: #e8f0ff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-answer:hover:not(:disabled) {
    background: #1e3a6e;
    border-color: #4a80d0;
    transform: translateX(4px);
  }
  .btn-answer.correct {
    background: #0f3d28;
    border-color: #10b981;
    color: #6ee7b7;
  }
  .btn-answer.wrong {
    background: #3d1515;
    border-color: #ef4444;
    color: #fca5a5;
  }
  .btn-answer:disabled { cursor: default; }

  /* GAME SCREEN */
  #game-screen { display: none; }

  /* HUD */
  .hud {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .hud-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 12px;
    font-family: 'DotGothic16', sans-serif;
    color: var(--muted);
    flex-shrink: 0;
  }
  .hud-item span {
    color: var(--gold);
    font-size: 15px;
  }

  /* HP BAR */
  .hp-wrap { flex: 1; min-width: 120px; }
  .hp-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: 'DotGothic16', sans-serif; }
  .hp-bar-bg { height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .hp-bar { height: 100%; border-radius: 6px; transition: width 0.5s ease, background 0.5s; }

  /* BATTLE SCENE */
  .battle-scene {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    min-height: 120px;
    position: relative;
    overflow: hidden;
  }
  .battle-scene::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent, rgba(15,25,60,0.5));
  }
  .battle-scene-bg {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    font-size: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .battle-flex {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 1;
  }
  .enemy-side { text-align: center; }
  .enemy-sprite { font-size: 56px; display: block; margin-bottom: 4px; animation: enemy-float 2s ease-in-out infinite; }
  @keyframes enemy-float { 0%,100%{transform:translateY(0) scaleX(-1);} 50%{transform:translateY(-6px) scaleX(-1);} }
  .enemy-name-plate {
    background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 11px;
    color: #fca5a5;
    font-family: 'DotGothic16', sans-serif;
  }

  .hero-side { text-align: center; }
  .hero-battle-sprite { font-size: 48px; display: block; margin-bottom: 4px; }
  .hero-name-plate {
    background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.4);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 11px;
    color: #93c5fd;
    font-family: 'DotGothic16', sans-serif;
  }

  /* MESSAGE BOX */
  .message-box {
    background: #1a2540;
    border: 2px solid #2a4070;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.8;
    min-height: 70px;
    position: relative;
    color: #ddeeff;
  }
  .message-box .hint {
    display: inline-block;
    background: #2d1f5e;
    border: 1px solid #6d4fbf;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: #d8c8ff;
    margin-top: 8px;
    margin-left: 0;
    display: block;
  }

  /* QUESTION BOX */
  .question-box {
    background: #162035;
    border: 2px solid #2a4a80;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .question-level {
    font-size: 11px;
    color: #7ab8ff;
    font-family: 'DotGothic16', sans-serif;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .question-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.6;
    color: #ffffff;
  }

  /* FEEDBACK */
  .feedback {
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 14px;
    line-height: 1.7;
    display: none;
  }
  .feedback.correct-fb { background: #0d3020; border: 2px solid #10b981; color: #d0fff0; }
  .feedback.wrong-fb { background: #3a0f0f; border: 2px solid #ef4444; color: #ffe0e0; }
  .feedback-title { font-weight: 900; margin-bottom: 6px; font-size: 16px; }
  .feedback.correct-fb .feedback-title { color: #34d399; }
  .feedback.wrong-fb .feedback-title { color: #f87171; }
  .feedback-exp { color: #a0c8e8; font-size: 13px; margin-top: 6px; }

  /* NEXT BTN */
  .btn-next {
    display: none;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DotGothic16', sans-serif;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 0 #3b1286;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #3b1286; }
  .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #3b1286; }

  /* RESULT SCREEN */
  #result-screen {
    display: none;
    text-align: center;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 30px 20px;
  }
  .result-title {
    font-family: 'DotGothic16', sans-serif;
    font-size: 28px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    margin-bottom: 20px;
  }
  .result-score {
    font-family: 'DotGothic16', sans-serif;
    font-size: 52px;
    color: white;
    margin: 20px 0;
  }
  .result-score span { color: var(--gold); }
  .result-rank {
    font-size: 16px;
    padding: 10px 30px;
    border-radius: 30px;
    display: inline-block;
    margin-bottom: 20px;
    font-weight: 900;
    letter-spacing: 2px;
  }
  .rank-s { background: rgba(255,215,0,0.2); border: 2px solid var(--gold); color: var(--gold); }
  .rank-a { background: rgba(59,130,246,0.2); border: 2px solid var(--blue); color: #93c5fd; }
  .rank-b { background: rgba(16,185,129,0.2); border: 2px solid var(--green); color: #6ee7b7; }
  .rank-c { background: rgba(239,68,68,0.15); border: 2px solid var(--red); color: #fca5a5; }

  .result-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.8; }
  .result-wrong-list { text-align: left; margin: 16px 0; }
  .wrong-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .wrong-q { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .wrong-correct { color: #6ee7b7; }

  /* EXP BAR */
  .exp-section { margin: 16px 0; }
  .exp-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'DotGothic16', sans-serif; }
  .exp-bg { height: 16px; background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .exp-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); border-radius: 8px; transition: width 1.5s ease; width: 0%; }

  /* LEVEL UP */
  .levelup-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), #f59e0b);
    color: #1a1000;
    font-family: 'DotGothic16', sans-serif;
    font-size: 14px;
    padding: 8px 24px;
    border-radius: 30px;
    margin: 10px;
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
    animation: pulse 1s ease infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

  /* SHAKE ANIMATION */
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }
  .shake { animation: shake 0.4s ease; }

  /* FLASH */
  @keyframes flash-green { 0%,100%{background:var(--panel);} 50%{background:rgba(16,185,129,0.15);} }
  .flash-correct { animation: flash-green 0.5s ease; }

  .q-count { font-size: 12px; color: var(--muted); font-family: 'DotGothic16', sans-serif; }
</style>
</head>
<body>
<style>
#pw-gate{position:fixed;inset:0;z-index:9999;background:#0a1020;display:flex;align-items:center;justify-content:center;padding:16px;}
#pw-gate.hidden{display:none;}
.pg-card{width:min(340px,100%);background:rgba(8,14,32,.97);border:2px solid #2a4a80;border-radius:18px;padding:26px 20px;text-align:center;box-shadow:0 0 60px rgba(59,130,246,.2);}
.pg-logo{font-size:42px;display:block;margin-bottom:6px;animation:pgfl 4s ease-in-out infinite;}
@keyframes pgfl{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.pg-title{font-family:"M PLUS Rounded 1c",sans-serif;font-size:20px;font-weight:900;color:#ffd700;margin-bottom:4px;}
.pg-sub{font-size:11px;color:#506080;margin-bottom:18px;letter-spacing:1px;}
.pg-label{font-size:12px;color:#8090b0;margin-bottom:8px;}
.pg-row{display:flex;gap:8px;margin-bottom:8px;}
.pg-input{flex:1;background:rgba(20,35,70,.9);border:1.5px solid #2a4a80;border-radius:10px;color:#e0ecff;font-size:18px;padding:11px 10px;outline:none;letter-spacing:4px;text-align:center;transition:border-color .2s;-webkit-appearance:none;}
.pg-input:focus{border-color:#5bc8f5;}
.pg-btn{background:linear-gradient(135deg,#1a5aaa,#2a7ae0);color:#fff;border:none;border-radius:10px;font-size:14px;padding:11px 14px;cursor:pointer;flex-shrink:0;box-shadow:0 4px 0 #0e3880;}
.pg-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #0e3880;}
.pg-err{font-size:11px;color:#ef4444;min-height:14px;opacity:0;transition:opacity .3s;}
.pg-err.show{opacity:1;}
@keyframes pgshk{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
.pgshk{animation:pgshk .4s ease;}
</style>
<div id="pw-gate"><div class="pg-card" id="pg-card">
<span class="pg-logo">&#x1F3D4;&#xFE0F;</span>
<div class="pg-title">&#x4E2D;&#x5B66;&#x53D7;&#x9A13;&#x3078;&#x306E;&#x9053;</div>
<div class="pg-sub">JUKENJR ADVENTURE</div>
<div class="pg-label">&#x1F511; &#x30D1;&#x30B9;&#x30EF;&#x30FC;&#x30C9;&#x3092;&#x5165;&#x529B;&#x3057;&#x3066;&#x306D;</div>
<div class="pg-row">
<input type="password" class="pg-input" id="pg-pw" placeholder="&#x30D1;&#x30B9;&#x30EF;&#x30FC;&#x30C9;" maxlength="20" autocomplete="off"/>
<button class="pg-btn" id="pg-btn">&#x25B6;</button>
</div>
<div class="pg-err" id="pg-err">&#x30D1;&#x30B9;&#x30EF;&#x30FC;&#x30C9;&#x304C;&#x3061;&#x304C;&#x3046;&#x3088;&#xFF01;</div>
</div></div>
<script>
(function(){
  var H="a8e637868c5bf190f57db6db972b8fb90ea03454f7db777c0f807db6d20679a5";
  var SK="jukenjr_v3";
  function hex(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");}
  function tryPw(){
    var v=document.getElementById("pg-pw").value.trim().toLowerCase();
    if(!v)return;
    var enc=new TextEncoder();
    crypto.subtle.digest("SHA-256",enc.encode(v)).then(function(buf){
      if(hex(buf)===H){
        sessionStorage.setItem(SK,"1");
        document.getElementById("pw-gate").classList.add("hidden");
      } else {
        document.getElementById("pg-err").classList.add("show");
        document.getElementById("pg-card").classList.add("pgshk");
        setTimeout(function(){document.getElementById("pg-card").classList.remove("pgshk");},400);
        setTimeout(function(){document.getElementById("pg-err").classList.remove("show");},2500);
        document.getElementById("pg-pw").value="";
      }
    });
  }
  document.addEventListener("DOMContentLoaded",function(){
    document.getElementById("pg-btn").addEventListener("click",tryPw);
    document.getElementById("pg-pw").addEventListener("keydown",function(e){if(e.key==="Enter")tryPw();});
    if(sessionStorage.getItem(SK)==="1")document.getElementById("pw-gate").classList.add("hidden");
  });
})();
</script>

<div id="app">

<!-- TITLE SCREEN -->

<script>
const questions = [
  {
    // 難易度3: 日本のエネルギー自給率
    level: 1,
    enemy: "⚡",
    enemyName: "自給率モンスター",
    bg: "🌏",
    message: "日本のエネルギー自給率はどのくらいじゃ！答えてみせろ！",
    q: "2021年時点の日本のエネルギー自給率として正しいものはどれ？",
    choices: [
      "約31.3%",
      "約51.3%",
      "約11.3%",
      "約71.3%"

let currentQ = 0;
let score = 0;
let hp = 5;
let wrongQuestions = [];
let level = 1;

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('level-display').textContent = level;
  document.getElementById('score-display').textContent = score;
  document.getElementById('q-level').textContent = `LEVEL ${q.level} ★`.padEnd(12, '　');
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('enemy-sprite').textContent = q.enemy;
  document.getElementById('enemy-name').textContent = q.enemyName;
  document.getElementById('scene-bg').textContent = q.bg;
  document.getElementById('message-box').innerHTML = `「${q.message}」<span class="hint">💡 ヒント：${q.hint}</span>`;

  const area = document.getElementById('answers-area');
  area.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-answer';
    btn.textContent = `${['Ａ','Ｂ','Ｃ','Ｄ'][i]}　${c}`;
    btn.onclick = () => answer(i);
    area.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  updateHP();
}

function answer(idx) {
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.btn-answer');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';

  if (idx === q.correct) {
    // CORRECT
    btns[idx].classList.add('correct');
    score++;
    level = Math.min(10, Math.floor(score / 2) + 1);
    document.getElementById('score-display').textContent = score;
    document.getElementById('level-display').textContent = level;

    fb.classList.add('correct-fb');
    document.getElementById('feedback-title').textContent = '⚔️ 大ダメージ！　せいかい！';
    document.getElementById('feedback-body').innerHTML = `<b style="color:#6ee7b7;">${q.choices[q.correct]}</b><br/><br/>${q.explanation}`;
    document.getElementById('feedback-exp').textContent = `＋10 経験値ゲット！`;
    document.getElementById('battle-scene').classList.add('flash-correct');
    setTimeout(() => document.getElementById('battle-scene').classList.remove('flash-correct'), 500);
    document.getElementById('message-box').innerHTML = '「やるな…！ダメージを受けた！」';
  } else {
    // WRONG
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    hp = Math.max(0, hp - 1);
    updateHP();
    wrongQuestions.push({ q: q.q, correct: q.choices[q.correct] });

    fb.classList.add('wrong-fb');
    document.getElementById('feedback-title').textContent = '💥 まちがい！　HPが減った！';
    document.getElementById('feedback-body').innerHTML = `<b style="color:#fca5a5;">正しい答え：${q.choices[q.correct]}</b><br/><br/>${q.explanation}`;
    document.getElementById('feedback-exp').textContent = '次は絶対覚えよう！';
    document.getElementById('battle-scene').classList.add('shake');
    setTimeout(() => document.getElementById('battle-scene').classList.remove('shake'), 400);
    document.getElementById('message-box').innerHTML = '「くらえ！HPが減ってしまった…」';
  }

  fb.style.display = 'block';

  const nextBtn = document.getElementById('btn-next');
  nextBtn.style.display = 'block';
  nextBtn.textContent = currentQ < questions.length - 1 ? '▶　次の問題へ' : '🏆　結果を見る！';
}

function updateHP() {
  const ratio = hp / 5 * 100;
  const bar = document.getElementById('hp-bar');
  bar.style.width = ratio + '%';
  document.getElementById('hp-num').textContent = hp;
  if (ratio > 60) bar.style.background = 'linear-gradient(90deg,#10b981,#059669)';
  else if (ratio > 30) bar.style.background = 'linear-gradient(90deg,#f59e0b,#d97706)';
  else bar.style.background = 'linear-gradient(90deg,#ef4444,#dc2626)';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  document.getElementById('final-score').textContent = score;

  let rank, rankClass, emoji, msg;
  if (score === 10) {
    rank = '🌟 Ｓランク 🌟'; rankClass = 'rank-s'; emoji = '🏆';
    msg = '完璧です！全問正解！\n「日本の資源と林業」マスター達成！\n中学受験本番でも絶対に解けるぞ！';
  } else if (score >= 8) {
    rank = '✨ Ａランク ✨'; rankClass = 'rank-a'; emoji = '🥇';
    msg = `すばらしい！${score}問正解！\nあと少しで完璧！\n間違えた問題を復習しよう。`;
  } else if (score >= 6) {
    rank = '⭐ Ｂランク ⭐'; rankClass = 'rank-b'; emoji = '🥈';
    msg = `${score}問正解！よく頑張った！\n間違えた問題の解説をよく読んで、もう一度チャレンジしよう！`;
  } else {
    rank = '💪 Ｃランク 💪'; rankClass = 'rank-c'; emoji = '🔰';
    msg = `${score}問正解。まだまだ伸びしろあり！\nストーリー教材をもう一度読んでから、再チャレンジしよう！`;
  }

  document.getElementById('result-title').textContent = score >= 8 ? 'クリア！！' : 'ゲームオーバー…？いや、まだだ！';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-rank').className = `result-rank ${rankClass}`;
  document.getElementById('result-msg').textContent = msg;

  if (score === 10) {
    document.getElementById('levelup-area').innerHTML = '<div class="levelup-badge">🎉 レベルMAX達成！</div>';
  }

  const expPct = Math.min(100, score * 10);
  setTimeout(() => {
    document.getElementById('exp-fill').style.width = expPct + '%';
  }, 500);

  if (wrongQuestions.length > 0) {
    let html = '<div class="result-wrong-list"><div style="font-size:13px;color:#6b8aaa;font-family:DotGothic16,sans-serif;margin-bottom:10px;">📝 間違えた問題の復習</div>';
    wrongQuestions.forEach(w => {
      html += `<div class="wrong-item"><div class="wrong-q">問：${w.q}</div><div class="wrong-correct">✅ 正解：${w.correct}</div></div>`;
    });
    html += '</div>';
    document.getElementById('wrong-review').innerHTML = html;
  }
}

function restart() {
  currentQ = 0; score = 0; hp = 5; wrongQuestions = []; level = 1;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'block';
  document.getElementById('exp-fill').style.width = '0%';
  document.getElementById('levelup-area').innerHTML = '';
  document.getElementById('wrong-review').innerHTML = '';
}
</script>
