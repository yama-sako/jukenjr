<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>理科クイズ第2回 物のあたたまり方</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08101e;--panel:#0d1a2e;--border:#1a3050;
  --ocean:#0e7aba;--sky:#5bc8f5;--gold:#ffd166;
  --green:#06d6a0;--coral:#ef476f;--text:#e8f4fd;--muted:#7aaec8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.7;padding-bottom:60px;min-height:100vh;}
#pw-gate{position:fixed;inset:0;z-index:9999;background:#0a1020;display:flex;align-items:center;justify-content:center;padding:16px;}
#pw-gate.hidden{display:none;}
.pg-card{width:min(340px,100%);background:rgba(8,14,32,.97);border:2px solid #2a4a80;border-radius:18px;padding:26px 20px;text-align:center;box-shadow:0 0 60px rgba(59,130,246,.2);}
.pg-logo{font-size:42px;display:block;margin-bottom:6px;animation:pgfl 4s ease-in-out infinite;}
@keyframes pgfl{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.pg-title{font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:#ffd700;margin-bottom:4px;}
.pg-sub{font-size:11px;color:#506080;margin-bottom:18px;letter-spacing:1px;}
.pg-label{font-size:12px;color:#8090b0;margin-bottom:8px;}
.pg-row{display:flex;gap:8px;margin-bottom:8px;}
.pg-input{flex:1;background:rgba(20,35,70,.9);border:1.5px solid #2a4a80;border-radius:10px;color:#e0ecff;font-size:18px;padding:11px 10px;outline:none;letter-spacing:4px;text-align:center;transition:border-color .2s;-webkit-appearance:none;}
.pg-input:focus{border-color:#5bc8f5;}
.pg-btn{background:linear-gradient(135deg,#1a5aaa,#2a7ae0);color:#fff;border:none;border-radius:10px;font-size:14px;padding:11px 14px;cursor:pointer;flex-shrink:0;box-shadow:0 4px 0 #0e3880;}
.pg-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #0e3880;}
.pg-err{font-size:11px;color:#ef4444;min-height:14px;opacity:0;transition:opacity .3s;}
.pg-err.show{opacity:1;}
@keyframes pgshk{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
.pgshk{animation:pgshk .4s ease;}
.quiz-header{text-align:center;padding:28px 16px 18px;border-bottom:2px solid var(--border);background:linear-gradient(135deg,#0a1a3a,#061528);}
.pixel-title{font-family:'M PLUS Rounded 1c',sans-serif;font-size:clamp(18px,5vw,26px);font-weight:900;color:var(--coral);text-shadow:0 0 20px rgba(239,71,111,.4);line-height:1.3;}
.title-sub{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:6px;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.hp-display{display:flex;align-items:center;gap:4px;}
.hp-heart{font-size:18px;}
.xp-bar-wrap{flex:1;min-width:120px;}
.xp-label{font-size:11px;color:var(--muted);margin-bottom:3px;}
.xp-bar{height:8px;background:#1a3050;border-radius:4px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--coral),var(--gold));border-radius:4px;transition:width .5s;}
.q-counter{font-size:13px;color:var(--sky);font-weight:700;}
.quiz-wrap{max-width:680px;margin:0 auto;padding:16px 12px;}
.q-card{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.q-number{font-size:11px;color:var(--coral);letter-spacing:2px;font-weight:700;margin-bottom:8px;}
.q-text{font-size:15px;font-weight:700;line-height:1.6;margin-bottom:14px;}
.hint-btn{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.35);border-radius:8px;color:var(--gold);font-size:12px;padding:6px 14px;cursor:pointer;margin-bottom:10px;}
.hint-box{background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.25);border-radius:8px;padding:10px 12px;font-size:13px;color:#e8d080;margin-bottom:10px;display:none;}
.hint-box.show{display:block;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:440px){.choices{grid-template-columns:1fr;}}
.choice-btn{background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;padding:12px 10px;cursor:pointer;text-align:left;transition:all .2s;line-height:1.5;}
.choice-btn:hover{border-color:var(--coral);background:rgba(239,71,111,.08);}
.choice-btn.correct{background:rgba(6,214,160,.2);border-color:var(--green);color:#fff;}
.choice-btn.wrong{background:rgba(239,71,111,.15);border-color:var(--coral);color:#ffaaaa;}
.choice-btn:disabled{cursor:default;}
.choice-label{font-size:11px;color:var(--muted);font-weight:700;margin-right:6px;}
.feedback{border-radius:10px;padding:12px 14px;margin-top:10px;font-size:14px;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.35);color:var(--green);}
.feedback.ng{background:rgba(239,71,111,.12);border:1px solid rgba(239,71,111,.35);color:#ff8080;}
.result-screen{display:none;max-width:500px;margin:0 auto;padding:20px 16px;text-align:center;}
.result-screen.show{display:block;}
.rank-label{font-family:'M PLUS Rounded 1c',sans-serif;font-size:40px;font-weight:900;margin-bottom:8px;}
.rank-S{color:#ffd166;text-shadow:0 0 30px rgba(255,209,102,.6);}
.rank-A{color:#06d6a0;text-shadow:0 0 30px rgba(6,214,160,.5);}
.rank-B{color:#5bc8f5;}
.rank-C{color:#7aaec8;}
.result-msg{font-size:15px;line-height:1.8;margin:12px 0;white-space:pre-line;}
.score-table{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin:14px 0;text-align:left;}
.score-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:14px;}
.score-row:last-child{border-bottom:none;font-weight:700;}
.nav-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.nav-btn{background:linear-gradient(135deg,#1a3a7a,#2a5aaa);border:1.5px solid #3a6aaa;border-radius:12px;color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;font-weight:700;padding:10px 18px;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 4px 0 #0e2060;}
.nav-btn.story{background:linear-gradient(135deg,#0a4a2a,#0a7a44);border-color:#0a9a54;box-shadow:0 4px 0 #052a14;}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pw-gate"><div class="pg-card" id="pg-card">
<span class="pg-logo">🔥</span>
<div class="pg-title">中学受験への道</div>
<div class="pg-sub">JUKENJR ADVENTURE</div>
<div class="pg-label">🔑 パスワードを入力してね</div>
<div class="pg-row">
<input type="password" class="pg-input" id="pg-pw" placeholder="パスワード" maxlength="20" autocomplete="off"/>
<button class="pg-btn" id="pg-btn">▶</button>
</div>
<div class="pg-err" id="pg-err">パスワードがちがうよ！</div>
</div></div>
<script>
(function(){
  var H="a8e637868c5bf190f57db6db972b8fb90ea03454f7db777c0f807db6d20679a5";
  var SK="jukenjr_v3";
  function hex(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");}
  function tryPw(){
    var v=document.getElementById("pg-pw").value.trim().toLowerCase();
    if(!v)return;
    crypto.subtle.digest("SHA-256",new TextEncoder().encode(v)).then(function(buf){
      if(hex(buf)===H){sessionStorage.setItem(SK,"1");document.getElementById("pw-gate").classList.add("hidden");}
      else{document.getElementById("pg-err").classList.add("show");document.getElementById("pg-card").classList.add("pgshk");setTimeout(function(){document.getElementById("pg-card").classList.remove("pgshk");},400);setTimeout(function(){document.getElementById("pg-err").classList.remove("show");},2500);document.getElementById("pg-pw").value="";}
    });
  }
  document.addEventListener("DOMContentLoaded",function(){
    document.getElementById("pg-btn").addEventListener("click",tryPw);
    document.getElementById("pg-pw").addEventListener("keydown",function(e){if(e.key==="Enter")tryPw();});
    if(sessionStorage.getItem(SK)==="1")document.getElementById("pw-gate").classList.add("hidden");
  });
})();
</script>

<!-- HEADER -->
<div class="quiz-header">
  <div class="pixel-title">🎯 理科クエスト<br>【物のあたたまり方】</div>
  <div class="title-sub">中学受験　理科小５上　第２回</div>
</div>

<div class="status-bar">
  <div class="hp-display" id="hp-display"></div>
  <div class="xp-bar-wrap">
    <div class="xp-label">経験値 <span id="xp-val">0</span> XP</div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
  <div class="q-counter" id="q-counter">Q 1 / 10</div>
</div>

<div class="quiz-wrap" id="quiz-area"></div>
<div class="result-screen" id="result-screen"></div>

<script>
const QUESTIONS = [
  {
    q:"熱の移動について正しいものはどれか。",
    choices:["A. 熱は温度の低い物から高い物へ移動する","B. 熱は温度の高い物から低い物へ移動する","C. 2つの物の温度が同じでも熱は移動し続ける","D. 体積の大きい物のほうが温度変化が大きい"],
    ans:1,
    hint:"お風呂に水を足すと、熱はどちらからどちらへ移動する？",
    explain:"熱は必ず温度の高い物から低い物へ移動します。2つの物の温度が同じになると熱の移動はとまります。体積の少ない物のほうが温度変化が大きくなります。"
  },
  {
    q:"水1gの温度を1℃上げるのに必要な熱量は何カロリーか。",
    choices:["A. 0.5カロリー","B. 1カロリー","C. 5カロリー","D. 10カロリー"],
    ans:1,
    hint:"「カロリー」の定義そのものを聞いている問題。",
    explain:"水1gの温度を1℃上げるのに必要な熱量が1カロリー（cal）の定義です。これが熱量計算の基本単位になります。"
  },
  {
    q:"80℃の水300gと20℃の水100gを混ぜると何℃になるか。",
    choices:["A. 50℃","B. 55℃","C. 65℃","D. 70℃"],
    ans:2,
    hint:"それぞれの熱量を計算してから合計し、合計の重さで割る。",
    explain:"300×80＝24000cal、100×20＝2000cal、合計26000cal÷(300+100)g＝65℃。熱量の合計を水の合計重さで割ります。"
  },
  {
    q:"金属の熱の伝わり方（伝導）として正しい説明はどれか。",
    choices:["A. 熱したところから遠い方から順番に伝わる","B. 熱したところから近い方から順番に伝わる","C. 全体が一度に均等に温まる","D. 上の部分から順番に温まる"],
    ans:1,
    hint:"ろうを塗った金属棒を一端から熱すると、どちら側のろうから溶ける？",
    explain:"伝導は熱したところに近い方から順番に熱が伝わっていきます。金属棒を一端から熱すると、炎に近い側のろうから順に溶けます。"
  },
  {
    q:"熱の伝わりやすさについて、次の4つを伝わりやすい順に並べたとき正しいのはどれか。\n（銅・鉄・アルミニウム・木）",
    choices:["A. 銅→鉄→アルミニウム→木","B. 銅→アルミニウム→鉄→木","C. アルミニウム→銅→鉄→木","D. 鉄→銅→アルミニウム→木"],
    ans:1,
    hint:"「銀→銅→アルミニウム→鉄→ガラス→木→空気」の順番。",
    explain:"銅→アルミニウム→鉄→木の順に熱が伝わりやすい。銀が最も伝わりやすく、空気が最も伝わりにくいです。"
  },
  {
    q:"水をビーカーの底から加熱したとき、対流のようすとして正しいのはどれか。",
    choices:["A. あたためられた水は重くなり底に沈む","B. あたためられた水は軽くなり上にのぼる","C. 冷たい水が上にのぼり温かい水が底に沈む","D. 水は対流を起こさず伝導だけで温まる"],
    ans:1,
    explain:"あたためられた水はぼう張して軽くなり上にのぼります。冷たい水は重いので下に来る、この循環が対流です。"
  },
  {
    q:"次のうち誤っているものはどれか。",
    choices:[
      "A. 試験管内の水の上部を熱しても下部の氷はとけにくい",
      "B. 冷房器具は部屋の上部に設置するほうが効率がよい",
      "C. 暖房器具は部屋の上部に設置するほうが効率がよい",
      "D. 空気の対流を利用してストーブは部屋全体を暖める"
    ],
    ans:2,
    explain:"暖房器具は部屋の下部に設置するほうが効率がよい。あたためられた空気は軽くなって上にのぼるので、下から温めることで対流が起き部屋全体が効率よく温まります。"
  },
  {
    q:"放射（放射熱）の特徴として正しいものはどれか。",
    choices:[
      "A. 空気を通してのみ伝わる",
      "B. 液体を通してのみ伝わる",
      "C. 真空中でも光と同じように伝わる",
      "D. 固体中を伝わることはできない"
    ],
    ans:2,
    explain:"放射熱は光と同じように直進し、真空の宇宙空間でも伝わります。これが太陽の熱が地球まで届く理由です。伝導や対流は物質が必要ですが、放射は不要です。"
  },
  {
    q:"直射日光を当てたとき、温度が最も上がりやすい色はどれか。",
    choices:["A. 白","B. 黄","C. 赤","D. 黒"],
    ans:3,
    explain:"放射熱は黒い物体に最も吸収されやすく、白い物体には最も吸収されにくい性質があります。黒→青→赤→黄→白の順に吸収しやすくなります。"
  },
  {
    q:"0℃の氷100gを90℃の水400gの中に入れると、氷が全部とけて水温が均一になった。このときの水温は何℃か。ただし、0℃の氷1gを0℃の水1gにするのに必要な熱量は80カロリーとする。",
    choices:["A. 46℃","B. 52℃","C. 56℃","D. 60℃"],
    ans:2,
    explain:"90℃の水400gの熱量：400×90＝36000cal。氷100gを溶かす熱量：80×100＝8000cal。残る熱量：36000−8000＝28000cal。水の合計：400+100＝500g。水温：28000÷500＝56℃。"
  }
];

let currentQ=0, hp=5, xp=0, wrongQs=[], answered=false;

function renderHP(){
  const d=document.getElementById('hp-display');
  d.innerHTML='';
  for(let i=0;i<5;i++){const s=document.createElement('span');s.className='hp-heart';s.textContent=i<hp?'❤️':'🖤';d.appendChild(s);}
}
function renderXP(){
  document.getElementById('xp-val').textContent=xp;
  document.getElementById('xp-fill').style.width=(xp)+'%';
}
function renderQuestion(){
  if(currentQ>=QUESTIONS.length){showResult();return;}
  answered=false;
  const q=QUESTIONS[currentQ];
  document.getElementById('q-counter').textContent=`Q ${currentQ+1} / ${QUESTIONS.length}`;
  const area=document.getElementById('quiz-area');
  const hasHint=currentQ<4;
  const labels=['A','B','C','D'];
  let choicesHTML=q.choices.map((c,i)=>`<button class="choice-btn" onclick="answer(${i})" id="choice-${i}"><span class="choice-label">${labels[i]}.</span>${c.replace(/^[A-D]\. /,'')}</button>`).join('');
  area.innerHTML=`
    <div class="q-card" id="q-card">
      <div class="q-number">QUESTION ${currentQ+1}</div>
      <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
      ${hasHint?`<button class="hint-btn" onclick="showHint()">💡 ヒントを見る</button><div class="hint-box" id="hint-box">${q.hint}</div>`:''}
      <div class="choices">${choicesHTML}</div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <button id="next-btn" onclick="nextQ()" style="display:none;background:linear-gradient(135deg,#1a3a7a,#2a5aaa);border:1.5px solid #3a6aaa;border-radius:12px;color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:700;padding:12px 28px;cursor:pointer;box-shadow:0 4px 0 #0e2060;">次の問題へ ▶</button>
    </div>`;
}
function showHint(){document.getElementById('hint-box').classList.add('show');}
function answer(idx){
  if(answered)return;
  answered=true;
  const q=QUESTIONS[currentQ];
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  fb.classList.add('show');
  if(idx===q.ans){
    btns[idx].classList.add('correct');
    fb.classList.add('ok');
    fb.innerHTML='✅ 正解！<br><small>'+q.explain+'</small>';
    xp+=10;renderXP();
  } else {
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    fb.classList.add('ng');
    fb.innerHTML='❌ 不正解…<br><small>'+q.explain+'</small>';
    hp--;wrongQs.push(currentQ+1);renderHP();
  }
  document.getElementById('next-btn').style.display='inline-block';
}
function nextQ(){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){
  document.getElementById('quiz-area').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.classList.add('show');
  const correct=10-wrongQs.length;
  let rank,rankClass,emoji,msg;
  if(correct===10){rank='S';rankClass='rank-S';emoji='🏆';msg='完璧です！全問正解！\n「物のあたたまり方」マスター達成！\n中学受験本番でも絶対に解けるぞ！';}
  else if(correct>=8){rank='A';rankClass='rank-A';emoji='⭐';msg='すばらしい！ほぼ完璧！\n熱量計算もバッチリだ！';}
  else if(correct>=6){rank='B';rankClass='rank-B';emoji='👍';msg='よくがんばった！\nまちがえた問題をストーリーで確認しよう。';}
  else{rank='C';rankClass='rank-C';emoji='💪';msg='もう一度ストーリーを読んで、チャレンジしよう！';}
  const wrongStr=wrongQs.length>0?wrongQs.join('・')+'番':'なし';
  rs.innerHTML=`
    <div style="font-size:48px;margin:10px 0">${emoji}</div>
    <div class="rank-label ${rankClass}">RANK ${rank}</div>
    <div class="result-msg">${msg}</div>
    <div class="score-table">
      <div class="score-row"><span>正解数</span><span>${correct} / 10</span></div>
      <div class="score-row"><span>獲得XP</span><span>${xp} XP</span></div>
      <div class="score-row"><span>まちがえた問題</span><span>${wrongStr}</span></div>
      <div class="score-row"><span>HP残り</span><span>${hp>0?'❤️'.repeat(hp):'力尽きた…'}</span></div>
    </div>
    <div class="nav-btns">
      <a class="nav-btn story" href="https://yama-sako.github.io/jukenjr/science_story_02.html">📖 ストーリーを読む</a>
      <a class="nav-btn" href="https://yama-sako.github.io/jukenjr/stamp_sheet.html">🏠 スタンプシートへ</a>
    </div>`;
}
document.addEventListener('DOMContentLoaded',function(){renderHP();renderXP();renderQuestion();});
</script>
</body>
</html>
